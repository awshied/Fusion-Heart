version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fusion-heart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fusion-heart-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendetta"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fusion-heart-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fusion-heart-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/heart', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3

  backend-dev:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: fusion-heart
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://vendetta:u6A1pTuqmsRwev8e@postgres:5432/fusion-heart
      JWT_SECRET: HjmhX7p4DCwBPRSaM9LOyEJ5qfzNnQVWb3eZFG1ridU6tcKlu8kYgTIsx02voA
      CLIENT_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - postgres
    networks:
      - fusion-heart-network
    command: npm run dev

  adminer:
    image: adminer:latest
    container_name: fusion-heart-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - fusion-heart-network

networks:
  fusion-heart-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
